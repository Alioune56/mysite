{% extends "blog/base.html" %}
{% block title %}My Blog{% endblock %}
{% block content %}
 <h1>My Blog</h1>
 <hr>
 {% for post in posts %}
 <h2>
 <a href="{% url 'blog:post_detail' post.id %}">
 {{ post.title }}
 </a>
 </h2>
 <p class="date">
 Publié {{ post.publish }} by {{ post.auteur }}
 </p>
 {{ post.body|truncatewords:30|linebreaks }}
 {% endfor %}
{% endblock %}
